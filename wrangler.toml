name = "webwaka-real-estate-api"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Staging Environment ──────────────────────────────────────────────────────
[env.staging]
name = "webwaka-real-estate-api-staging"
workers_dev = true

[env.staging.vars]
ENVIRONMENT = "staging"
# Secrets (set via: wrangler secret put <KEY> --env staging)
# JWT_SECRET
# PAYSTACK_SECRET_KEY
# INTER_SERVICE_SECRET

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-real-estate-db-staging"
database_id = "PLACEHOLDER_REAL_ESTATE_D1_STAGING_ID"

[[env.staging.kv_namespaces]]
binding = "TENANT_CONFIG"
id = "PLACEHOLDER_REAL_ESTATE_KV_STAGING_ID"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "PLACEHOLDER_REAL_ESTATE_RATE_LIMIT_KV_STAGING_ID"

[[env.staging.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-real-estate-docs-staging"

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "webwaka-real-estate-api-prod"
route = { pattern = "real-estate.webwaka.app/*", zone_name = "webwaka.app" }

[env.production.vars]
ENVIRONMENT = "production"
# Secrets (set via: wrangler secret put <KEY> --env production)
# JWT_SECRET
# PAYSTACK_SECRET_KEY
# INTER_SERVICE_SECRET

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-real-estate-db-prod"
database_id = "PLACEHOLDER_REAL_ESTATE_D1_PROD_ID"

[[env.production.kv_namespaces]]
binding = "TENANT_CONFIG"
id = "PLACEHOLDER_REAL_ESTATE_KV_PROD_ID"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "PLACEHOLDER_REAL_ESTATE_RATE_LIMIT_KV_PROD_ID"

[[env.production.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-real-estate-docs-prod"
