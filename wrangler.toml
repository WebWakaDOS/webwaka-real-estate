name = "webwaka-real-estate-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Local Development ────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "development"
JWT_SECRET = "dev-secret-change-in-production"

[[d1_databases]]
binding = "DB"
database_name = "webwaka-real-estate-local"
database_id = "local"

[[kv_namespaces]]
binding = "TENANT_CONFIG"
id = "local-tenant-config"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "local-rate-limit"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-real-estate-docs-local"

# ─── Staging Environment ──────────────────────────────────────────────────────
[env.staging]
name = "webwaka-real-estate-api-staging"
workers_dev = true

[env.staging.vars]
ENVIRONMENT = "staging"
# Secrets (set via: wrangler secret put <KEY> --env staging)
# JWT_SECRET
# PAYSTACK_SECRET_KEY
# INTER_SERVICE_SECRET

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-staging-db"
database_id = "d7278ca0-2408-40d5-a08b-d8456601f667"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "TENANT_CONFIG"
id = "7a9ed1992f224a1fb3583557fd996d25"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "75c03d9076c84759b6fa5ae4f1b71880"

[[env.staging.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-real-estate-docs-staging"

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "webwaka-real-estate-api-prod"
workers_dev = true

[env.production.vars]
ENVIRONMENT = "production"
# Secrets (set via: wrangler secret put <KEY> --env production)
# JWT_SECRET
# PAYSTACK_SECRET_KEY
# INTER_SERVICE_SECRET

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-production-db"
database_id = "d01940d3-d69e-4455-94ba-bc2404cb3872"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "TENANT_CONFIG"
id = "29c59dc2ee8442c9af03789ae0d592b6"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "c9e17a143b364922a29975ea8a5e8c70"

[[env.production.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-real-estate-docs-prod"
