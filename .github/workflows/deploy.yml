name: WebWaka Real Estate — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Layer 1: Lint + Type Check ──────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Enforce no console.log in src/
        run: |
          if grep -r 'console\.log' src/ --include='*.ts'; then
            echo "FAIL: console.log found in src/ — use structured logging only"
            exit 1
          fi
          echo "PASS: No console.log found"
      - name: Enforce kobo invariant — no naira float amounts in DB writes
        run: |
          if grep -rn 'price_naira\|amount_naira\|rent_naira\|deposit_naira' src/ --include='*.ts'; then
            echo "FAIL: Naira column names found — all monetary values must use _kobo suffix"
            exit 1
          fi
          echo "PASS: All monetary columns use kobo naming"

  # ─── Layer 2: Unit Tests ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ─── Layer 3: D1 Migration (staging) ─────────────────────────────────────────
  migrate-staging:
    name: D1 Migration (Staging)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Apply D1 migrations (staging)
        run: npx wrangler d1 migrations apply webwaka-real-estate-db-staging --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Layer 4: Deploy to Staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy Worker (Staging)
    runs-on: ubuntu-latest
    needs: migrate-staging
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Cloudflare Workers (staging)
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Layer 5: Health Check ────────────────────────────────────────────────────
  health-check:
    name: Health Check (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Verify staging health endpoint
        run: |
          RESPONSE=$(curl -sf https://webwaka-real-estate-staging.webwaka.workers.dev/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || (echo "FAIL: Health check failed" && exit 1)
          echo "PASS: Staging health check passed"

  # ─── Production Deploy (main only) ───────────────────────────────────────────
  deploy-production:
    name: Deploy Worker (Production)
    runs-on: ubuntu-latest
    needs: health-check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Apply D1 migrations (production)
        run: npx wrangler d1 migrations apply webwaka-real-estate-db-production --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Workers (production)
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
